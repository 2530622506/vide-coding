name: gesp-catalog-prod

x-api-image: &api-image
  image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_OWNER:-2530622506}/${API_IMAGE_NAME:-gesp-catalog-api}:${IMAGE_TAG:-main}

services:
  mysql:
    image: mysql:8.4
    container_name: gesp-catalog-mysql-prod
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env.prod}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gesp_catalog}
      MYSQL_USER: ${MYSQL_USER:-gesp}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env.prod}
      TZ: Asia/Shanghai
    volumes:
      - mysql-prod-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - catalog

  api:
    <<: *api-image
    container_name: gesp-catalog-api-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3001}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gesp_catalog}
      MYSQL_USER: ${MYSQL_USER:-gesp}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env.prod}
      CATALOG_MYSQL_REQUIRED: ${CATALOG_MYSQL_REQUIRED:-false}
      JUDGE0_ENDPOINT: ${JUDGE0_ENDPOINT:-}
      JUDGE0_API_HOST: ${JUDGE0_API_HOST:-}
      JUDGE0_API_KEY: ${JUDGE0_API_KEY:-}
      JUDGE0_AUTH_MODE: ${JUDGE0_AUTH_MODE:-rapidapi}
      JUDGE0_CPP_LANGUAGE_ID: ${JUDGE0_CPP_LANGUAGE_ID:-76}
      JUDGE0_TIMEOUT_MS: ${JUDGE0_TIMEOUT_MS:-10000}
      CODE_RUN_MAX_STDIN_BYTES: ${CODE_RUN_MAX_STDIN_BYTES:-20000}
      CODE_RUN_MAX_SOURCE_BYTES: ${CODE_RUN_MAX_SOURCE_BYTES:-100000}
      CODE_RUN_MAX_OUTPUT_BYTES: ${CODE_RUN_MAX_OUTPUT_BYTES:-50000}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 3001) + '/api/catalog/levels').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - catalog

  seed:
    <<: *api-image
    container_name: gesp-catalog-seed-prod
    profiles:
      - seed
    command: ["node", "scripts/seed-mysql-catalog.mjs"]
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gesp_catalog}
      MYSQL_USER: ${MYSQL_USER:-gesp}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env.prod}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - catalog

  web:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_OWNER:-2530622506}/${WEB_IMAGE_NAME:-gesp-catalog-web}:${IMAGE_TAG:-main}
    container_name: gesp-catalog-web-prod
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - catalog

volumes:
  mysql-prod-data:

networks:
  catalog:
