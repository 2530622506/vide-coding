name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to deploy
        required: false
        default: main
      seed_on_deploy:
        description: Run seed job after services are up
        required: false
        default: "false"
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_REGISTRY: ghcr.io
      IMAGE_OWNER: ${{ github.repository_owner }}
      API_IMAGE_NAME: gesp-catalog-api
      WEB_IMAGE_NAME: gesp-catalog-web
      API_IMAGE: ghcr.io/${{ github.repository_owner }}/gesp-catalog-api
      WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/gesp-catalog-web
      IMAGE_SHA_TAG: sha-${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm build:api

      - name: Build Web
        run: pnpm build:web

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve deploy variables
        id: vars
        shell: bash
        run: |
          image_tag="main"
          seed_on_deploy="false"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
              image_tag="${{ github.event.inputs.image_tag }}"
            fi
            if [[ "${{ github.event.inputs.seed_on_deploy }}" == "true" ]]; then
              seed_on_deploy="true"
            fi
          fi

          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "seed_on_deploy=$seed_on_deploy" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/api.Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:main
            ${{ env.API_IMAGE }}:${{ env.IMAGE_SHA_TAG }}

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/web.Dockerfile
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:main
            ${{ env.WEB_IMAGE }}:${{ env.IMAGE_SHA_TAG }}

      - name: Prepare remote deploy directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          timeout: 120s
          command_timeout: 30m
          script: |
            mkdir -p "${{ secrets.DEPLOY_PATH }}/infra/deploy"

      - name: Upload runtime files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          timeout: 120s
          command_timeout: 30m
          target: ${{ secrets.DEPLOY_PATH }}
          source: "docker-compose.prod.yml,infra/deploy/deploy-prod.sh"

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
          IMAGE_OWNER: ${{ env.IMAGE_OWNER }}
          API_IMAGE_NAME: ${{ env.API_IMAGE_NAME }}
          WEB_IMAGE_NAME: ${{ env.WEB_IMAGE_NAME }}
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
          SEED_ON_DEPLOY: ${{ steps.vars.outputs.seed_on_deploy }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          timeout: 120s
          command_timeout: 30m
          envs: DEPLOY_PATH,IMAGE_REGISTRY,IMAGE_OWNER,API_IMAGE_NAME,WEB_IMAGE_NAME,IMAGE_TAG,SEED_ON_DEPLOY,GHCR_USERNAME,GHCR_TOKEN
          script: |
            cd "$DEPLOY_PATH"
            chmod +x infra/deploy/deploy-prod.sh
            bash infra/deploy/deploy-prod.sh
