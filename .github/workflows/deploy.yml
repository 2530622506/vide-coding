name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      seed_on_deploy:
        description: Run seed after deploy
        required: false
        default: "false"
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm build:api

      - name: Build Web
        run: pnpm build:web

      - name: Resolve deploy variables
        id: vars
        shell: bash
        run: |
          seed_on_deploy="false"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.seed_on_deploy }}" == "true" ]]; then
            seed_on_deploy="true"
          fi

          echo "seed_on_deploy=$seed_on_deploy" >> "$GITHUB_OUTPUT"

      - name: Setup SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure remote deploy directory
        shell: bash
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "mkdir -p '${{ secrets.DEPLOY_PATH }}'"

      - name: Sync project to server
        shell: bash
        run: |
          rsync -az --delete \
            --exclude .git \
            --exclude .env.prod \
            --exclude node_modules \
            --exclude dist \
            --exclude .workflow \
            --exclude .python-deps \
            --exclude '*.log' \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Deploy on server
        shell: bash
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "
            cd '${{ secrets.DEPLOY_PATH }}' && \
            chmod +x infra/deploy/deploy-prod.sh && \
            SEED_ON_DEPLOY='${{ steps.vars.outputs.seed_on_deploy }}' \
            bash infra/deploy/deploy-prod.sh
          "
